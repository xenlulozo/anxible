---
- name: Deploy CMS Youtube
  hosts: all
  become: yes
  gather_facts: false

  tasks:

    - name: Add server config
      shell: |
        jq '.servers += [{"host":"1.2.3.4","port":3334}]' /opt/game/config.json > /opt/game/config_tmp.json
        mv /opt/game/config_tmp.json /opt/game/config.json